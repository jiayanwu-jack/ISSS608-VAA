<script>
document.addEventListener("DOMContentLoaded", () => {
  const exercises = [
    ["Hands-on_Ex/Hands-on_Ex01/Hands-on_Ex01.html", "Exercise 1", "Introduction to Visual Analytics"],
    ["Hands-on_Ex/Hands-on_Ex02/Hands-on_Ex02.html", "Exercise 2", "Designing Graphs to Enlighten"],
    ["Hands-on_Ex/Hands-on_Ex03/Hands-on_Ex03a.html", "Exercise 3a", "Interactive Data Visualisation"],
    ["Hands-on_Ex/Hands-on_Ex03/Hands-on_Ex03b.html", "Exercise 3b", "Animated Statistical Graphics"],
    ["Hands-on_Ex/Hands-on_Ex04/Hands-on_Ex04a.html", "Exercise 4a", "Visualising Distribution"],
    ["Hands-on_Ex/Hands-on_Ex04/Hands-on_Ex04b.html", "Exercise 4b", "Visual Statistical Analysis"],
    ["Hands-on_Ex/Hands-on_Ex04/Hands-on_Ex04c.html", "Exercise 4c", "Visualising Uncertainty"],
    ["Hands-on_Ex/Hands-on_Ex04/Hands-on_Ex04d.html", "Exercise 4d", "Building Funnel Plots"],
    ["Hands-on_Ex/Hands-on_Ex05/Hands-on_Ex05a.html", "Exercise 5a", "Building Ternary Plots"],
    ["Hands-on_Ex/Hands-on_Ex05/Hands-on_Ex05b.html", "Exercise 5b", "Visual Correlation Analysis"],
    ["Hands-on_Ex/Hands-on_Ex05/Hands-on_Ex05c.html", "Exercise 5c", "Multivariate Analysis with Heatmaps"],
    ["Hands-on_Ex/Hands-on_Ex05/Hands-on_Ex05d.html", "Exercise 5d", "Parallel Coordinates Plots"],
    ["Hands-on_Ex/Hands-on_Ex05/Hands-on_Ex05e.html", "Exercise 5e", "Treemap Visualisation"],
    ["Hands-on_Ex/Hands-on_Ex07/Hands-on_Ex07a.html", "Exercise 7a", "Network Data"],
    ["Hands-on_Ex/Hands-on_Ex07/Hands-on_Ex07b.html", "Exercise 7b", "Text Data"],
    ["Hands-on_Ex/Hands-on_Ex08/Hands-on_Ex08.html", "Exercise 8", "Time-Oriented Data"],
    ["Hands-on_Ex/Hands-on_Ex09/Hands-on_Ex09a.html", "Exercise 9a", "Choropleth Mapping"],
    ["Hands-on_Ex/Hands-on_Ex09/Hands-on_Ex09b.html", "Exercise 9b", "Geospatial Point Data"],
    ["Hands-on_Ex/Hands-on_Ex09/Hands-on_Ex09c.html", "Exercise 9c", "Analytical Mapping"],
    ["Hands-on_Ex/Hands-on_Ex10/Hands-on_Ex10.html", "Exercise 10", "Information Dashboard Design"]
  ];

  const marker = "Hands-on_Ex/";
  const markerIndex = window.location.pathname.indexOf(marker);
  if (markerIndex < 0) return;

  const currentPath = window.location.pathname.slice(markerIndex);
  const currentIndex = exercises.findIndex(([path]) => path === currentPath);
  const main = document.querySelector("main.content");
  if (currentIndex < 0 || !main) return;

  const siteRoot = window.location.pathname.slice(0, markerIndex);
  const nav = document.createElement("nav");
  nav.className = "chapter-navigation";
  nav.setAttribute("aria-label", "Hands-on exercise navigation");

  const makeButton = (exercise, direction) => {
    const [path, label, title] = exercise;
    const link = document.createElement("a");
    link.className = `chapter-nav-button chapter-nav-${direction}`;
    link.href = `${siteRoot}${path}`;
    link.innerHTML = direction === "previous"
      ? `<span class="chapter-nav-direction">← Previous chapter</span><span class="chapter-nav-title">${label} · ${title}</span>`
      : `<span class="chapter-nav-direction">Next chapter →</span><span class="chapter-nav-title">${label} · ${title}</span>`;
    return link;
  };

  if (currentIndex > 0) {
    nav.appendChild(makeButton(exercises[currentIndex - 1], "previous"));
  } else {
    nav.appendChild(document.createElement("span"));
  }

  if (currentIndex < exercises.length - 1) {
    nav.appendChild(makeButton(exercises[currentIndex + 1], "next"));
  }

  main.appendChild(nav);
});
</script>
